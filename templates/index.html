<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vectorless RAG</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <button id="menuBtn" class="dot-btn right" aria-label="Open menu">...</button>
  <div id="menuPopover" class="menu-popover" aria-hidden="true">
    <button id="menuDocuments" class="menu-item">Documents</button>
    <button id="menuResult" class="menu-item">Result</button>
  </div>

  <aside id="infoPanel" class="side-panel right-panel">
    <div class="panel-head">
      <h2 id="panelTitle">Documents</h2>
      <button id="closePanel" class="close-btn" aria-label="Close panel">x</button>
    </div>
    <div class="panel-body">
      <section id="documentsSection">
        <p class="panel-label">Current document ID</p>
        <div id="docInfo" class="mono-block"></div>

        <p class="panel-label">Document status</p>
        <div id="statusInfo" class="mono-block">Unknown</div>

        <button id="statusBtn" class="secondary">Refresh Status</button>

        <hr />

        <p class="panel-label">Load new document</p>
        <input id="pdfFile" type="file" accept="application/pdf" />
        <button id="uploadBtn">Upload New PDF</button>

        <label for="modelInput" class="panel-label">Model</label>
        <input id="modelInput" type="text" value="llama-3.3-70b-versatile" />
      </section>

      <section id="resultSection" class="hidden-section">
        <p class="panel-label">Reasoning</p>
        <pre id="thinkingBox" class="detail-box"></pre>

        <p class="panel-label">Node List</p>
        <pre id="nodesBox" class="detail-box"></pre>
      </section>
    </div>
  </aside>

  <main class="chat-shell">
    <header class="chat-header">
      <h1>Vectorless RAG</h1>
      <p>Ask questions on your loaded document.</p>
    </header>

    <section id="chatMessages" class="chat-messages"></section>

    <section class="chat-input-wrap">
      <textarea id="queryInput" rows="2" placeholder="Ask your document anything..."></textarea>
      <button id="askBtn">Send</button>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
